name: Metrics
on:
  schedule: [{cron: "0 0 * * 1"}]   # Weekly, Mondays 00:00 UTC
  workflow_dispatch:                # Allow manual runs from the Actions tab
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PRIVATE_TOKEN }}

          config_output: svg
          config_timezone: America/Edmonton

          base: ""                             # Show ONLY the languages block (no header/activity/etc.)

          repositories: 100
          repositories_skipped: ${{ secrets.REPOS_TO_SKIP }}

          # Recently-used languages
          plugin_languages: yes
          plugin_languages_sections: recently-used
          plugin_languages_indepth: yes
          plugin_languages_recent_load: 300         # how many recent GitHub events to scan
          plugin_languages_recent_days: 30          # time window to look back
          plugin_languages_recent_categories: markup, programming
          plugin_languages_colors: rainbow
          plugin_languages_limit: 20
          plugin_languages_threshold: 0%
          plugin_languages_details: percentage

          commits_authoring: nicolasfracchia
