name: Metrics
on:
  schedule: [{cron: "0 0 * * 1"}]   # Weekly, Mondays 00:00 UTC
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PRIVATE_TOKEN }}

          config_output: svg
          config_timezone: America/Edmonton

          base: ""                               # languages block only

          repositories: 100
          repositories_skipped: ${{ secrets.REPOS_TO_SKIP }}

          # Most-used languages (recently-used is broken upstream)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_categories: markup, programming
          plugin_languages_colors: rainbow
          plugin_languages_limit: 20
          plugin_languages_threshold: 0%
          plugin_languages_details: percentage

          commits_authoring: nicolasfracchia     # add other commit emails/names you've used
